name: firebase
description: Provides all firebase related features for the app.
publish_to: 'none'

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  cloud_firestore: ^5.6.8
  cloud_functions: ^5.5.1
  dependency_injection:
    path: ../dependency_injection
  equatable: ^2.0.7
  firebase_analytics: ^11.4.6
  firebase_app_check: ^0.3.2+6
  firebase_auth: ^5.5.4
  firebase_core: ^3.13.1
  firebase_crashlytics: ^4.3.6
  firebase_remote_config: ^5.4.4
  firebase_storage: ^12.4.6
  flutter:
    sdk: flutter
  path_provider: ^2.1.5

dev_dependencies:
  fake_cloud_firestore: ^3.1.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
