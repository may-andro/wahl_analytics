name: wahl_analytics
description: "Dashboard app for Wahl Analytics"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
repository: https://github.com/may-andro/wahl_analytics

version: 1.0.0+1

environment:
  sdk: ^3.9.2

workspace:
  - layer/cache
  - layer/core
  - layer/dependency_injection
  - layer/design_system
  - layer/error_reporter
  - layer/feature_flag
  - layer/firebase
  - layer/log_reporter
  - layer/remote
  - layer/tracking
  - layer/use_case
  - tool/firestore_content_uploader
  - tool/storybook

dependencies:
  cache:
    path: layer/cache
  collection: ^1.19.1
  core:
    path: layer/core
  cupertino_icons: ^1.0.8
  dependency_injection:
    path: layer/dependency_injection
  design_system:
    path: layer/design_system
  equatable: ^2.0.7
  error_reporter:
    path: layer/error_reporter
  feature_flag:
    path: layer/feature_flag
  file_picker: ^10.3.3
  firebase:
    path: layer/firebase
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.6
  go_router: ^16.2.4
  intl: ^0.20.2
  json_annotation: ^4.9.0
  log_reporter:
    path: layer/log_reporter
  meta: ^1.16.0
  open_file: ^3.5.10
  package_info_plus: ^9.0.0
  recase: ^4.1.0
  remote:
    path: layer/remote
  tracking:
    path: layer/tracking
  url_launcher: ^6.3.2
  use_case:
    path: layer/use_case

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.5.4
  custom_lint: ^0.7.5
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  json_serializable: ^6.11.1
  lint: ^2.8.0
  melos: ^7.1.1
  mocktail: ^1.0.4
  test: ^1.24.9

flutter:
  uses-material-design: true
  generate: true

melos:
  useRootAsPackage: true

  command:
    bootstrap:
      environment:
        sdk: '^3.9.2'
        flutter: ^3.35.4
      dependencies:
        collection: ^1.19.1
        equatable: ^2.0.7
        intl: ^0.20.2
        json_annotation: ^4.9.0
        meta: ^1.16.0
        recase: ^4.1.0
        visibility_detector: ^0.4.0+2
      dev_dependencies:
        build_runner: ^2.5.4
        json_serializable: ^6.11.1
        mocktail: ^1.0.4
        test: ^1.24.9
      hooks:
        post: dart run build_runner build --delete-conflicting-outputs

    clean:
      hooks:
        post: melos exec --flutter --concurrency=1 -- "flutter clean"

  scripts:
    get:
      run: flutter pub get
      description: Run `flutter pub get` in all packages.
      exec:
        concurrency: 1
      packageFilters:
        flutter: true

    gen:
      run: dart run build_runner build --delete-conflicting-outputs
      description: Run `build_runner` in all packages.
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: build_runner

    analyze:
      run: flutter analyze .
      description: Run `dart analyze` for all packages.
      exec:
        concurrency: 1
      packageFilters:
        flutter: true

    analyze_fix:
      run: |
        dart fix --dry-run
        dart fix --apply
        dart format .
        flutter analyze
        flutter pub get
      description: Run `flutter analyze` and fix issues in all packages.
      exec:
        concurrency: 1
      packageFilters:
        flutter: true

    format_check:
      run: melos exec dart format . --set-exit-if-changed
      description: Run `dart format` checks for all packages.

    upgrade:
      run: flutter pub upgrade
      description: Run `flutter pub upgrade` in all packages.
      exec:
        concurrency: 1
      packageFilters:
        flutter: true

    cache_clean:
      run: |
        flutter clean
        flutter pub cache repair
        flutter pub get
      description: Clean cache.
      exec:
        concurrency: 1

    ios_clean:
      run: |
        rm -rf ios/Pods/*
        rm -f ios/Podfile.lock
        rm -r ios/.symlinks
        rm -rf ~/.pub-cache/hosted/pub.dartlang.org/ 
        rm -f ios/Flutter/Flutter.podspec
        flutter clean
        flutter pub get
        cd ios 
        pod cache clean --all
        pod repo update
        cd ..
        flutter pub get
        cd ios
        pod install
      description: Clean cache.

    test:
      run: flutter test --exclude-tags 'golden'
      description: Run `flutter test` in all packages.
      exec:
        concurrency: 1
      packageFilters:
        flutter: true

    update_golden_test:
      run: flutter test --tags golden --update-goldens
      description: Update `golden` test files in all packages.
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: alchemist

    golden_test:
      run: flutter test --tags golden
      description: Run `golden` tests in all packages.
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: alchemist

    golden_test_in_ci:
      run: flutter test --tags golden --dart-define=CI=true
      description: Run `golden` tests in all packages.
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: alchemist

    gen_splash:
      run: |
        flutter clean
        flutter pub get
        dart run flutter_native_splash:create --path=native_splash.yaml
      description: Generate splash screen for all flavors.
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: flutter_native_splash

    gen_icon:
      run: |
        flutter pub run flutter_launcher_icons -f flutter_launcher_icons.yaml
      description: Generate icons for the app.
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: flutter_launcher_icons

    gen_translations:
      run: |
        flutter gen-l10n
      description: Generate locale for the app.
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: flutter_localizations

    run_prod:
      run: flutter run lib/main.dart  --dart-define=build_env=prod
      description: Run the app in prod env.

    run_prod_release:
      run: flutter run lib/main.dart  --dart-define=build_env=prod --release
      description: Run the release app in prod env.

    run_prod_web_release:
      run: flutter run lib/main.dart  --dart-define=build_env=prod --release -d chrome --web-port=1234
      description: Run the app in prod env.

    run_staging_web:
      run: flutter run lib/main.dart  --dart-define=build_env=staging -d chrome --web-port=1234
      description: Run the app in staging env.

    run_staging:
      run: flutter run lib/main.dart  --dart-define=build_env=staging
      description: Run the app in staging env.

    module_checks:
      run: |
        flutter analyze
        dart fix --dry-run
        dart fix --apply
        dart format .
        flutter analyze
        flutter pub get
        flutter test --exclude-tags 'golden'
      description: Run analyze, fix, format, test a module
      exec:
        concurrency: 1
      packageFilters:
        flutter: true

    test_with_coverage:
      run: flutter test --exclude-tags golden --coverage --machine > test-results.json --no-pub
      description: Run all the test with coverage
      exec:
        concurrency: 1
      packageFilters:
        flutter: true
        dirExists: test

    gen_app:
      run: dart run build_runner build --delete-conflicting-outputs
      description: Run `build_runner` in all packages.
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: build_runner
        ignore:
          - storybook

    host_web:
      run: |
        echo "Clean existing repository"
        flutter clean
        echo "Getting packages"
        flutter pub get 
        echo "Building web with Flutter"
        flutter build web --release --dart-define=build_env=prod
        echo "Deploying to Firebase"
        firebase deploy --only hosting
      description: Host flutter web page

    host_storybook:
      run: |
        cd tool/storybook
        echo "Clean existing repository"
        flutter clean
        echo "Getting packages"
        flutter pub get 
        echo "Building web with Flutter"
        flutter build web --release
        echo "Deploying to Firebase"
        firebase deploy --only hosting:wahl-consultancy-storybook-320bf-5669e --project wahl-consultancy-storybook-320bf-5669e
      description: Host flutter web page

    host_privacy_policy:
      run: |
        cd tool/privacy_policy
        echo "Deploying to Firebase"
        firebase deploy --only hosting:privacy-policy-320bf
      description: Host static privacy policy web page

    host_terms_and_conditions:
      run: |
        cd tool/terms_and_condition
        echo "Deploying to Firebase"
        firebase deploy --only hosting:terms-and-condition-320bf
      description: Host static privacy policy web page

    host_functions:
      run: |
        cd tool/firebase_function/functions
        firebase deploy --only functions
      description: Deploy firebase functions

    upload_firestore_staging_content:
      run: |
        cd tool/firestore_content_uploader
        dart pub get
        dart run bin/firestore_content_uploader.dart upload --env staging --document business_client --credentials ../data/credentials/service_account.json --data ../data/firestore/staging/section_business_client.json
        dart run bin/firestore_content_uploader.dart upload --env staging --document business_contact --credentials ../data/credentials/service_account.json --data ../data/firestore/staging/section_business_contact.json
        dart run bin/firestore_content_uploader.dart upload --env staging --document business_info --credentials ../data/credentials/service_account.json --data ../data/firestore/staging/section_business_info.json
        dart run bin/firestore_content_uploader.dart upload --env staging --document business_service --credentials ../data/credentials/service_account.json --data ../data/firestore/staging/section_business_service.json
        dart run bin/firestore_content_uploader.dart upload --env staging --document business_team --credentials ../data/credentials/service_account.json --data ../data/firestore/staging/section_business_team.json
      description: Upload the content to Firestore for staging env
      packageFilters:
        dirExists: tool/firestore_content_uploader

    upload_firestore_prod_content:
      run: |
        cd tool/firestore_content_uploader
        dart pub get
        dart run bin/firestore_content_uploader.dart upload --env prod --document business_client --credentials ../data/credentials/service_account.json --data ../data/firestore/prod/section_business_client.json
        dart run bin/firestore_content_uploader.dart upload --env prod --document business_contact --credentials ../data/credentials/service_account.json --data ../data/firestore/prod/section_business_contact.json
        dart run bin/firestore_content_uploader.dart upload --env prod --document business_info --credentials ../data/credentials/service_account.json --data ../data/firestore/prod/section_business_info.json
        dart run bin/firestore_content_uploader.dart upload --env prod --document business_service --credentials ../data/credentials/service_account.json --data ../data/firestore/prod/section_business_service.json
        dart run bin/firestore_content_uploader.dart upload --env prod --document business_team --credentials ../data/credentials/service_account.json --data ../data/firestore/prod/section_business_team.json
      description: Upload the content to Firestore for staging env
      packageFilters:
        dirExists: tool/firestore_content_uploader