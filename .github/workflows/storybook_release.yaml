name: Storybook web release and hosting

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "*-storybook-prod"

jobs:
  build_release_notes:
    uses: ./.github/workflows/_storybook_build_release_notes.yaml
    with:
      preRelease: false

  code_quality_validation:
    uses: ./.github/workflows/_storybook_static_analysis.yaml
    needs: [build_release_notes]
    with:
      path: './tool/storybook'

  storybook_deploy:
    uses: ./.github/workflows/_storybook_deploy.yaml
    needs: [code_quality_validation]
    with:
      path: './tool/storybook'
      channelId: 'live'