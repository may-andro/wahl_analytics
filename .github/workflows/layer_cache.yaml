name: Cache layer code quality validation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '*-review'
      - '*-prod'
    #paths:
    #  - 'layers/core/**'
    #  - '.github/workflows/layer_core.yaml'

permissions:
  checks: write

jobs:
  validate_code_quality:
    uses: ./.github/workflows/_static_analyze_layer_with_test.yaml
    with:
      module_path: './layer/cache'
      has_build_runner: 'false'

