name: Deploy Storybook to firebase

on:
  workflow_call:
    inputs:
      channelId:
        type: string
        required: true
    secrets:
      STORYBOOK_FIREBASE_SERVICE_ACCOUNT:
        required: true
      STORYBOOK_FIREBASE_PROJECT_ID:
        required: true

env:
  FLUTTER_VERSION: 3.27.1
  STORYBOOK_PATH: ./tool/storybook

jobs:
 deploy:
    name: Deploy to firebase
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.STORYBOOK_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup the flutter environment
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{env.FLUTTER_VERSION}}
          channel: stable
          cache: true

      - name: Get dart dependencies
        run: flutter pub get

      - name: Run code generators
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Flutter Web
        run: flutter build web --release

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.STORYBOOK_FIREBASE_SERVICE_ACCOUNT }}"
          projectId: ${{ secrets.STORYBOOK_FIREBASE_PROJECT_ID }}
          entryPoint: ${{ env.STORYBOOK_PATH }}
          channelId: ${{ inputs.channelId }}