name: Storybook web preview release and hosting

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'tool/storybook/**'
      - 'layer/design_system/**'

jobs:
  code_quality_validation:
    uses: ./.github/workflows/_storybook_static_analysis.yaml

  storybook_deploy:
    uses: ./.github/workflows/_storybook_deploy.yaml
    needs: [code_quality_validation]
    with:
      channelId: 'preview'
    secrets:
      STORYBOOK_FIREBASE_SERVICE_ACCOUNT: ${{ secrets.STORYBOOK_FIREBASE_SERVICE_ACCOUNT }}
      STORYBOOK_FIREBASE_PROJECT_ID: ${{ secrets.STORYBOOK_FIREBASE_PROJECT_ID }}