# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  image_path_android: "assets/launchers/logo.png"
  min_sdk_android: 24
  adaptive_icon_background: "#F6F6F6"
  adaptive_icon_foreground_inset: 24
  adaptive_icon_foreground: "assets/launchers/logo.png"

  ios: true
  image_path_ios: "assets/launchers/logo.png"
  remove_alpha_channel_ios: true
  background_color_ios: "#F6F6F6"

  web:
    generate: true
    image_path: "assets/launchers/logo.png"
    background_color: "#F6F6F6"
    theme_color: "#990B2C"
